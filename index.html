<!DOCTYPE html>
<html lang="en" class="loading">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>readme.txt</title>
<link rel="icon" type="image/jpeg" href="favico.jpg">
<link rel="shortcut icon" href="favico.jpg">
<link rel="apple-touch-icon" href="favico.jpg">
<style>

  :root{
    --viewport-width: 100vw;
    --viewport-height: 100dvh;
    --viewport-left: 0px;
    --viewport-top: 0px;
    --viewport-inset-x: 10vw;
    --viewport-inset-y: 10dvh;
    --cursor-default: url('cursor.png') 4 4, auto;
    --cursor-link:    url('link.png') 4 4, pointer;
  }

  html.loading,
  html.loading body{
    overflow: hidden;
  }

  html.loading .frame{
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loader-screen{
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    opacity: 1;
    visibility: visible;
    transition: opacity 220ms linear, visibility 220ms linear;
  }

  .loader-screen.hidden{
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .ios-spinner{
    position: relative;
    width: 28px;
    height: 28px;
  }

  .ios-spinner div{
    position: absolute;
    top: 1px;
    left: 13px;
    width: 2px;
    height: 7px;
    border-radius: 999px;
    background: #000;
    transform-origin: 1px 13px;
    animation: ios-spinner-fade 1s linear infinite;
  }

  .ios-spinner div:nth-child(1){ transform: rotate(0deg); animation-delay: -0.9167s; }
  .ios-spinner div:nth-child(2){ transform: rotate(30deg); animation-delay: -0.8334s; }
  .ios-spinner div:nth-child(3){ transform: rotate(60deg); animation-delay: -0.7501s; }
  .ios-spinner div:nth-child(4){ transform: rotate(90deg); animation-delay: -0.6668s; }
  .ios-spinner div:nth-child(5){ transform: rotate(120deg); animation-delay: -0.5835s; }
  .ios-spinner div:nth-child(6){ transform: rotate(150deg); animation-delay: -0.5002s; }
  .ios-spinner div:nth-child(7){ transform: rotate(180deg); animation-delay: -0.4169s; }
  .ios-spinner div:nth-child(8){ transform: rotate(210deg); animation-delay: -0.3336s; }
  .ios-spinner div:nth-child(9){ transform: rotate(240deg); animation-delay: -0.2503s; }
  .ios-spinner div:nth-child(10){ transform: rotate(270deg); animation-delay: -0.167s; }
  .ios-spinner div:nth-child(11){ transform: rotate(300deg); animation-delay: -0.0837s; }
  .ios-spinner div:nth-child(12){ transform: rotate(330deg); animation-delay: 0s; }

  @keyframes ios-spinner-fade{
    0%{ opacity: 1; }
    100%{ opacity: 0.15; }
  }

  html, body{
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    color: #000000;
    overflow: hidden;
    cursor: var(--cursor-default);
    -webkit-user-select: none;
    user-select: none;
    touch-action: pan-y;
  }

  *{
    cursor: var(--cursor-default);
    -webkit-user-select: none;
    user-select: none;
  }

  a, [data-link]{
    cursor: var(--cursor-link);
  }

  .frame{
    position: fixed;
    top: calc(var(--viewport-top) + var(--viewport-inset-y));
    left: calc(var(--viewport-left) + var(--viewport-inset-x));
    width: calc(var(--viewport-width) - var(--viewport-inset-x) - var(--viewport-inset-x));
    height: calc(var(--viewport-height) - var(--viewport-inset-y) - var(--viewport-inset-y));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-outer{
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 4 / 3;
  }

  @media (min-aspect-ratio: 4/3){
    .page-outer{ width: auto; height: 100%; }
  }
  @media (max-aspect-ratio: 4/3){
    .page-outer{ width: 100%; height: auto; }
  }

  .page{
    position: relative;
    width: 100%;
    height: 100%;
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    will-change: filter;
    transition: filter 80ms linear;
  }
  .page::-webkit-scrollbar{
    display: none;
    width: 0;
    height: 0;
  }

  #text{
    font-family: Consolas, "Courier New", monospace;
    font-size: 16px;
    line-height: 1.32;
    white-space: pre-wrap;
    word-wrap: break-word;
    outline: none;
    min-height: 100%;
    text-align: justify;
  }

  #text.editing{
    caret-color: #000;
  }

  .body-line{
    font-size: 1.04em;
  }

  .body-line,
  .body-line *,
  .title-line,
  .title-line *,
  .identity-line,
  .identity-line *,
  .instagram-widget *,
  .youtube-widget *{
    -webkit-user-select: text;
    user-select: text;
  }

  img{
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
    user-select: none;
  }

  ::selection{
    background: #000;
    color: #fff;
  }
  ::-moz-selection{
    background: #000;
    color: #fff;
  }

  .char{
    opacity: 0;
    display: inline;
    transition: opacity 45ms linear;
  }
  .char.in{
    opacity: 1;
  }

  .hl{
    background: transparent;
    color: #000;
  }

  .hl .char{
    color: #000;
    transition: opacity 45ms linear, background-color 70ms linear, color 70ms linear;
  }

  .hl .char.selected,
  .hl.hl-complete{
    background: #000;
    color: #fff;
  }

  .identity-line{
    display: inline-block;
    width: 292px;
    font-size: 1.46em;
    line-height: 1.55;
    letter-spacing: 0.12em;
    text-align: center;
  }

  .divider-line{
    display: inline-block;
    width: 100%;
    text-align: center;
    line-height: 1.15;
  }

  .header-divider{
    margin-top: 22px;
  }

  .title-line{
    display: inline-block;
    width: 100%;
    text-align: center;
    line-height: 1.2;
  }

  .title-line::before,
  .title-line::after{
    display: inline-block;
    width: 8ch;
    margin: 0 8px;
    text-align: center;
    opacity: 0;
    transition: opacity 45ms linear;
  }

  .title-line::before{
    content: attr(data-left);
  }

  .title-line::after{
    content: attr(data-right);
  }

  .title-line.decorations-visible::before,
  .title-line.decorations-visible::after{
    opacity: 1;
  }

  .readme-signature{
    position: absolute;
    top: 0;
    left: 50%;
    width: 190px;
    height: 38px;
    overflow: hidden;
    transform: translateX(-50%);
    z-index: 3;
    pointer-events: none;
  }

  .readme-signature img{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 190px;
    height: auto;
    display: block;
    filter: none;
    transform: translate(-50%,-50%);
  }

  .antipublic-title-art{
    width: min(350px,72vw);
    height: auto;
    display: inline-block;
    position: relative;
    left: 50%;
    margin: 0;
    vertical-align: top;
    transform: translateX(-50%);
  }

  .cat-photo,
  .chroma-animation{
    width: 190px;
    height: 190px;
    display: block;
    margin: 4px auto;
    object-fit: cover;
  }

  .cat-photo{
    filter: grayscale(1) contrast(1.08);
  }

  .chroma-animation{
    filter: none;
  }

  .media-pair{
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin: 6px auto;
  }

  .cat-frame,
  .chroma-frame{
    width: max-content;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    color: #000;
    font-family: Consolas, "Courier New", monospace;
    line-height: 1;
    text-align: center;
  }

  .cat-frame::before,
  .chroma-frame::before{
    content: "┏━━━━━━━━ ★ ━━━━━━━━┓";
  }

  .cat-frame::after,
  .chroma-frame::after{
    content: "┗━━━━━━━━ ★ ━━━━━━━━┛";
  }

  .antipublic-footer-art{
    width: min(820px,92%);
    height: auto;
    display: block;
    margin: 0 auto 12px;
  }

  .plain-link{
    color: inherit;
    text-decoration: none;
    font: inherit;
  }

  .instagram-widget,
  .youtube-widget{
    width: 100%;
    min-height: 0;
    box-sizing: border-box;
    margin: 0;
    padding: 13px;
    border: 1px solid #fff;
    border-radius: 14px;
    color: #fff;
    background: linear-gradient(145deg,#111 0%,#000 58%);
    font-family: Arial, Helvetica, sans-serif;
    text-align: left;
    box-shadow: inset 0 0 0 1px #2a2a2a;
    display: flex;
    flex-direction: column;
  }

  .social-widgets-row{
    width: min(900px,96%);
    display: grid;
    grid-template-columns: repeat(2,minmax(0,1fr));
    gap: 16px;
    margin: 10px auto 20px;
  }

  .instagram-profile{
    display: grid;
    grid-template-columns: 84px 1fr;
    gap: 12px;
    align-items: center;
  }

  .instagram-avatar{
    width: 76px;
    height: 76px;
    display: block;
    border: 1px solid #000;
    border-radius: 50%;
    object-fit: cover;
    object-position: 50% 18%;
    filter: grayscale(1) contrast(1.06);
  }

  .instagram-avatar-ring{
    width: 78px;
    height: 78px;
    box-sizing: content-box;
    padding: 2px;
    border-radius: 50%;
    background: conic-gradient(#fff,#555,#000,#aaa,#fff);
    transform: translateY(5px);
  }

  .youtube-avatar{
    width: 78px;
    height: 78px;
    display: block;
    border: 1px solid #fff;
    border-radius: 50%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.12);
    transform: translateY(4px);
  }

  .instagram-name-row{
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 18px;
    font-weight: 700;
  }

  .instagram-verified{
    width: 17px;
    height: 17px;
    display: block;
    filter: grayscale(1);
  }

  .instagram-real-name,
  .instagram-bio{
    margin-top: 4px;
    font-size: 12px;
    line-height: 1.3;
  }

  .instagram-stats{
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 6px;
    margin: 10px 0;
    text-align: center;
  }

  .youtube-widget .instagram-stats{
    grid-template-columns: repeat(2,1fr);
  }

  .instagram-stat strong,
  .instagram-stat span{
    display: block;
  }

  .instagram-stat strong{
    font-size: 15px;
  }

  .instagram-stat span{
    margin-top: 2px;
    color: #aaa;
    font-size: 11px;
  }

  .instagram-follow{
    width: 100%;
    display: block;
    box-sizing: border-box;
    padding: 7px 12px;
    border: 1px solid #fff;
    border-radius: 8px;
    color: #000;
    background: #fff;
    font: 700 13px/1 Arial, Helvetica, sans-serif;
    text-align: center;
    text-decoration: none;
    margin-top: 7px;
  }


  .youtube-embed-wrap{
    width: min(720px,96%);
    box-sizing: border-box;
    margin: 10px auto 20px;
    padding: 0;
    color: #000;
    font-family: Arial, Helvetica, sans-serif;
  }

  .youtube-embed-frame{
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border: 0;
    border-radius: 10px;
    background: #000;
  }

  .youtube-embed-frame iframe{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .readme-credit{
    display: block;
    width: 100%;
    margin: 6px auto 18px;
    color: rgba(0,0,0,0.46);
    font-family: Consolas, "Courier New", monospace;
    font-size: 11px;
    line-height: 1.25;
    text-align: center;
  }

  .readme-credit a{
    color: inherit;
    text-decoration: none;
  }

  @media (max-width: 520px){
    .instagram-widget,
    .youtube-widget{
      height: 199px;
      padding: 11px;
    }

    .instagram-profile{
      grid-template-columns: 70px 1fr;
      gap: 10px;
    }

    .instagram-avatar{
      width: 62px;
      height: 62px;
    }

    .instagram-avatar-ring{
      width: 64px;
      height: 64px;
    }

    .youtube-avatar{
      width: 64px;
      height: 64px;
    }

    .social-widgets-row{
      grid-template-columns: 1fr;
    }

    .youtube-embed-wrap{
      width: 100%;
      margin: 4px auto 20px;
      padding: 0;
    }

    .youtube-embed-frame{
      border-radius: 14px;
    }

  }

  .sequence-media{
    opacity: 0;
    transition: opacity 45ms linear;
  }

  .sequence-media.sequence-visible{
    opacity: 1;
  }

  .readme-card-slot{
    --card-scale: 0.67;
    position: absolute;
    top: 42px;
    left: 50%;
    right: auto;
    width: 268px;
    height: 168px;
    z-index: 6;
    perspective: 1400px;
    -webkit-user-select: none;
    user-select: none;
    transform: translateX(-50%);
  }

  .readme-identity-copy{
    position: absolute;
    top: 53px;
    right: 0;
    width: 292px;
    z-index: 3;
    font-family: Consolas, "Courier New", monospace;
    font-size: 16px;
    line-height: 1.5;
    text-align: center;
    pointer-events: none;
  }

  .readme-identity-copy .identity-line{
    display: block;
  }

  .readme-card-scale{
    position: absolute;
    top: 0;
    right: 0;
    width: 400px;
    height: 250px;
    transform: scale(var(--card-scale));
    transform-origin: top right;
  }

  .readme-credit-card{
    --mx: 50%;
    --my: 50%;
    --tilt-x-deg: 0deg;
    --tilt-y-deg: 0deg;
    width: 400px;
    height: 250px;
    position: relative;
    transform-style: preserve-3d;
    filter: none;
    contain: layout style;
    will-change: transform;
  }

  .readme-card-outer,
  .readme-card-3d{
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .readme-card-3d{
    transform: perspective(1400px) rotateX(0deg) rotateY(-2.5deg);
    transition: transform 0.6s cubic-bezier(0.25,1,0.5,1);
  }

  .readme-card-face{
    position: absolute;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    border-radius: 16px;
    padding: 24px;
    backface-visibility: hidden;
    overflow: hidden;
  }

  .readme-card-face::after{
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.25) 0, rgba(255,255,255,0.25) 0.5px, rgba(220,220,220,0.15) 0.5px, rgba(220,220,220,0.15) 1px),
      repeating-linear-gradient(-45deg, rgba(245,245,245,0.2) 0, rgba(245,245,245,0.2) 0.5px, rgba(210,210,210,0.12) 0.5px, rgba(210,210,210,0.12) 1px),
      repeating-linear-gradient(0deg, rgba(250,250,250,0.1) 0, rgba(250,250,250,0.1) 0.25px, rgba(235,235,235,0.08) 0.25px, rgba(235,235,235,0.08) 0.5px),
      radial-gradient(circle at 25% 25%, rgba(255,255,255,0.15) 0%, transparent 40%),
      radial-gradient(circle at 75% 75%, rgba(240,240,240,0.12) 0%, transparent 45%);
    mix-blend-mode: multiply;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }

  .readme-card-light{
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(800px 600px at var(--mx) var(--my), rgba(255,255,255,0.12), rgba(255,255,255,0.06) 60%, transparent 85%);
    opacity: 0;
    pointer-events: none;
    z-index: 15;
    mix-blend-mode: soft-light;
  }

  .readme-card-slot .front{
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: none;
    box-shadow: none;
  }

  .readme-card-slot .back{
    padding-top: 75px;
    color: #fff;
    background: #000;
    transform: rotateY(180deg);
    box-shadow: none;
  }

  .readme-card-slot .card-header{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .readme-card-slot .bank-name{
    color: #fff;
    font: 600 12px/1 "Courier New", monospace;
    letter-spacing: 1px;
    opacity: 0.8;
    text-shadow: none;
  }

  .readme-card-slot .card-type{
    color: #fff;
    font: 400 10px/1 "Courier New", monospace;
    letter-spacing: 0.5px;
    opacity: 0.6;
    text-shadow: none;
  }

  .readme-card-slot .chip{
    width: 56px;
    height: 42px;
    position: relative;
    margin-bottom: 30px;
    border: 2px solid #fff;
    border-radius: 4px;
    background: #fff;
  }

  .readme-card-slot .chip-svg{
    width: 100%;
    height: 100%;
    filter: brightness(0);
  }

  .readme-card-slot .card-number{
    margin-bottom: 25px;
    color: #fff;
    font: 500 22px/1 "Courier New", monospace;
    letter-spacing: 3px;
    text-shadow: none;
  }

  .readme-card-slot .card-number span{
    margin-right: 12px;
  }

  .readme-card-slot .card-info{
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .readme-card-slot .card-info > div:last-child{
    text-align: left;
  }

  .readme-card-slot .label{
    margin-bottom: 4px;
    color: #fff;
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  .readme-card-slot .value{
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    text-shadow: none;
  }

  .readme-card-slot .card-footer{
    position: absolute;
    right: 12px;
    bottom: 8px;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
  }

  .readme-card-slot .network-logo{
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: 0.5px;
    text-shadow: none;
  }

  .readme-card-slot .magnetic-stripe{
    position: absolute;
    top: 22px;
    left: 0;
    right: 0;
    height: 50px;
    z-index: 5;
    background: #fff;
    box-shadow: none;
  }

  .readme-card-slot .site-url{
    position: absolute;
    top: 8px;
    left: 24px;
    right: 24px;
    color: #fff;
    font: 400 8px/1 "Courier New", monospace;
    letter-spacing: 0.3px;
    opacity: 0.9;
  }

  .readme-card-slot .signature-section{
    display: flex;
    gap: 20px;
    margin-top: 12px;
    margin-bottom: 20px;
  }

  .readme-card-slot .signature-panel{
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #fff;
    border-radius: 4px;
    color: #000;
    background: #fff;
    box-shadow: none;
  }

  .readme-card-slot .signature-text{
    display: block;
    margin-bottom: 4px;
    color: #000;
    font-size: 8px;
  }

  .readme-card-slot .signature-line{
    height: 20px;
    border-bottom: 1px solid #ccc;
  }

  .readme-card-slot .signature-line img{
    width: 150px;
    height: 54px;
    object-fit: contain;
    filter: brightness(0.4);
    transform: translate(-10px,-20px);
  }

  .readme-card-slot .cvv-section{
    width: 80px;
    text-align: center;
  }

  .readme-card-slot .cvv-label{
    margin-bottom: 4px;
    font-size: 10px;
    opacity: 0.7;
  }

  .readme-card-slot .cvv-number{
    padding: 8px;
    border: 1px solid #fff;
    border-radius: 4px;
    color: #000;
    background: #fff;
    font: 600 14px/1 "Courier New", monospace;
  }

  .readme-card-slot .hologram{
    position: absolute;
    left: 8px;
    bottom: 6px;
    width: 70px;
    height: 70px;
    background: conic-gradient(from 90deg,#a8a8b8,#d5d5d5,#9292b4,#dadada,#a8a8b8);
    -webkit-mask: url('../presage.svg') center/contain no-repeat;
    mask: url('../presage.svg') center/contain no-repeat;
    opacity: 0.75;
  }

  .readme-card-slot .founder-text{
    position: absolute;
    left: 80px;
    bottom: 31px;
    color: #fff;
    font: 900 28px/1 "Courier New", monospace;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
    text-shadow: none;
  }

  .readme-card-slot .legal-text{
    position: absolute;
    right: 18px;
    bottom: 12px;
    max-width: 240px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    color: #fff;
    font: 400 7px/1.2 "Courier New", monospace;
    text-align: right;
    opacity: 0.9;
  }

  @media (max-width: 768px){
    .frame{
      top: var(--viewport-top);

  var blurAmountEl = document.getElementById('motion-blur-amount');
  var lastTop = 0;
  var lastTime = performance.now();
  var blurTimeout = null;
  var filterOn = false;

  pageEl.addEventListener('scroll', function(){
    var now = performance.now();
    var dt = Math.max(now - lastTime, 1);
    var dy = Math.abs(pageEl.scrollTop - lastTop);
    var velocity = dy / dt;

    var blur = Math.min(velocity * 4, 14);

    if (blur > 0.15){
      if (!filterOn){
        pageEl.style.filter = 'url(#motion-blur)';
        filterOn = true;
      }
      blurAmountEl.setAttribute('stdDeviation', '0 ' + blur.toFixed(2));
    }

    lastTop = pageEl.scrollTop;
    lastTime = now;

    clearTimeout(blurTimeout);
    blurTimeout = setTimeout(function(){
      blurAmountEl.setAttribute('stdDeviation', '0 0');
      pageEl.style.filter = 'none';
      filterOn = false;
    }, 100);
  }, { passive: true });

  document.addEventListener('keydown', function(e){
    var k = e.key;
    var blocked =
      k === 'F12' ||
      (e.ctrlKey && e.shiftKey && (k === 'I' || k === 'i')) ||
      (e.ctrlKey && e.shiftKey && (k === 'J' || k === 'j')) ||
      (e.ctrlKey && e.shiftKey && (k === 'C' || k === 'c')) ||
      (e.metaKey && e.altKey && (k === 'I' || k === 'i')) ||
      (e.ctrlKey && (k === 'U' || k === 'u'));

    if (blocked){
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  document.addEventListener('contextmenu', function(e){
    e.preventDefault();
  });

})();
</script>

<script>
  (function(){
    var root = document.documentElement;

    function updateViewport(){
      var viewport = window.visualViewport;
      var width = viewport ? viewport.width : window.innerWidth;
      var height = viewport ? viewport.height : window.innerHeight;
      var left = viewport ? viewport.offsetLeft : 0;
      var top = viewport ? viewport.offsetTop : 0;

      root.style.setProperty('--viewport-width', width + 'px');
      root.style.setProperty('--viewport-height', height + 'px');
      root.style.setProperty('--viewport-left', left + 'px');
      root.style.setProperty('--viewport-top', top + 'px');
      root.style.setProperty('--viewport-inset-x', width * 0.1 + 'px');
      root.style.setProperty('--viewport-inset-y', height * 0.1 + 'px');
    }

    updateViewport();
    window.addEventListener('resize', updateViewport);
    window.addEventListener('orientationchange', updateViewport);
    if (window.visualViewport){
      window.visualViewport.addEventListener('resize', updateViewport);
      window.visualViewport.addEventListener('scroll', updateViewport);
    }
  })();
</script>


<script>
  (function(){
    var mediaToPreload = [
      'firma.png?v=2',
      'cursor.png',
      'link.png',
      'titulo antipublic.svg',
      'gato.jpg',
      'chroma-alpha.webp',
      'antipublic.png',
      'instagram-avatar.webp',
      'verificado ig.svg',
      'youtube.jpg'
    ];

    function preloadImage(src){
      return new Promise(function(resolve){
        var img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = src;
      });
    }

    function hideLoader(){
      var loader = document.getElementById('loader-screen');
      document.documentElement.classList.remove('loading');
      if (loader) loader.classList.add('hidden');
      setTimeout(function(){
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 260);
    }

    var started = Date.now();
    Promise.all(mediaToPreload.map(preloadImage)).then(function(){
      var wait = Math.max(0, 520 - (Date.now() - started));
      setTimeout(hideLoader, wait);
    });

    setTimeout(hideLoader, 3500);
  })();
</script>
